<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Count Request Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 24px;
      color: #1f2937;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input, select, textarea {
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      width: 100%;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .add-btn {
      background: #2563eb;
      color: white;
    }

    .refresh-btn {
      background: #059669;
      color: white;
    }

    button:hover {
      opacity: 0.92;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      border: 1px solid #d1d5db;
      padding: 10px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #e5e7eb;
    }

    .empty-message {
      text-align: center;
      color: #6b7280;
      margin-top: 12px;
    }

    .small-note {
      margin-top: 14px;
      color: #6b7280;
      font-size: 13px;
      text-align: center;
    }

    .status {
      margin-bottom: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      display: none;
      font-size: 14px;
    }

    .status.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .status.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .saved-tag {
      font-weight: bold;
      color: #166534;
    }

    .loading {
      color: #6b7280;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Count Request Tracker</h1>
    <div class="subtitle">Submit count requests and share them across all users</div>

    <div id="statusMessage" class="status"></div>

    <div class="form-grid">
      <div class="form-group">
        <label for="erd">ERD</label>
        <select id="erd">
          <option value="">Select system</option>
          <option value="WMS">WMS</option>
          <option value="Deacom">Deacom</option>
          <option value="Fishbowl">Fishbowl</option>
        </select>
      </div>

      <div class="form-group">
        <label for="requestorName">Requested By</label>
        <input type="text" id="requestorName" placeholder="Enter requestor name" />
      </div>

      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" />
      </div>

      <div class="form-group">
        <label for="itemCode">Item / SKU</label>
        <input type="text" id="itemCode" placeholder="Enter item code or SKU" />
      </div>

      <div class="form-group">
        <label for="description">Item Description</label>
        <input type="text" id="description" placeholder="Enter item description" />
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" placeholder="Enter location" />
      </div>

      <div class="form-group">
        <label for="expectedQty">Expected Qty</label>
        <input type="number" id="expectedQty" placeholder="Enter expected quantity" />
      </div>

      <div class="form-group">
        <label for="priority">Priority</label>
        <select id="priority">
          <option value="">Select priority</option>
          <option value="Low">Low</option>
          <option value="Normal">Normal</option>
          <option value="High">High</option>
          <option value="Urgent">Urgent</option>
        </select>
      </div>

      <div class="form-group full">
        <label for="reason">Reason for Request</label>
        <textarea id="reason" placeholder="Explain why the count is needed"></textarea>
      </div>
    </div>

    <div class="button-row">
      <button class="add-btn" onclick="addRequest()">Submit Request</button>
      <button class="refresh-btn" onclick="loadRequests()">Refresh Requests</button>
    </div>

    <div class="table-wrapper">
      <table id="requestTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>ERD</th>
            <th>Requested By</th>
            <th>Item / SKU</th>
            <th>Description</th>
            <th>Location</th>
            <th>Expected Qty</th>
            <th>Priority</th>
            <th>Reason</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="requestTableBody">
          <tr>
            <td colspan="10" class="loading">Loading requests...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="empty-message" id="emptyMessage" style="display: none;">No requests found.</div>

    <div class="small-note">
      This page is connected to a shared Google Sheet. All users will see the same requests.
    </div>
  </div>

  <script>
    const SCRIPT_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";

    function showStatus(message, type) {
      const statusBox = document.getElementById("statusMessage");
      statusBox.className = "status " + type;
      statusBox.textContent = message;

      setTimeout(() => {
        statusBox.className = "status";
        statusBox.textContent = "";
      }, 4000);
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return "";
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function clearForm() {
      document.getElementById("erd").value = "";
      document.getElementById("requestorName").value = "";
      document.getElementById("date").value = "";
      document.getElementById("itemCode").value = "";
      document.getElementById("description").value = "";
      document.getElementById("location").value = "";
      document.getElementById("expectedQty").value = "";
      document.getElementById("priority").value = "";
      document.getElementById("reason").value = "";
    }

    async function addRequest() {
      const erd = document.getElementById("erd").value;
      const requestorName = document.getElementById("requestorName").value.trim();
      const date = document.getElementById("date").value;
      const itemCode = document.getElementById("itemCode").value.trim();
      const description = document.getElementById("description").value.trim();
      const location = document.getElementById("location").value.trim();
      const expectedQty = document.getElementById("expectedQty").value.trim();
      const priority = document.getElementById("priority").value;
      const reason = document.getElementById("reason").value.trim();

      if (!erd || !itemCode) {
        showStatus("Please enter at least ERD and Item / SKU.", "error");
        return;
      }

      const formData = new URLSearchParams();
      formData.append("erd", erd);
      formData.append("requestorName", requestorName);
      formData.append("date", date);
      formData.append("itemCode", itemCode);
      formData.append("description", description);
      formData.append("location", location);
      formData.append("expectedQty", expectedQty);
      formData.append("priority", priority);
      formData.append("reason", reason);

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          showStatus("Request submitted successfully.", "success");
          clearForm();
          loadRequests();
        } else {
          showStatus("Failed to submit request.", "error");
        }
      } catch (error) {
        console.error(error);
        showStatus("Error submitting request.", "error");
      }
    }

    async function loadRequests() {
      const tableBody = document.getElementById("requestTableBody");
      const emptyMessage = document.getElementById("emptyMessage");

      tableBody.innerHTML = `
        <tr>
          <td colspan="10" class="loading">Loading requests...</td>
        </tr>
      `;

      try {
        const response = await fetch(SCRIPT_URL);
        const requests = await response.json();

        tableBody.innerHTML = "";

        if (!requests.length) {
          emptyMessage.style.display = "block";
          return;
        }

        emptyMessage.style.display = "none";

        requests.forEach((request) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${escapeHtml(request["Date"] || "")}</td>
            <td>${escapeHtml(request["ERD"] || "")}</td>
            <td>${escapeHtml(request["Requested By"] || "")}</td>
            <td>${escapeHtml(request["Item / SKU"] || "")}</td>
            <td>${escapeHtml(request["Description"] || "")}</td>
            <td>${escapeHtml(request["Location"] || "")}</td>
            <td>${escapeHtml(request["Expected Qty"] || "")}</td>
            <td>${escapeHtml(request["Priority"] || "")}</td>
            <td>${escapeHtml(request["Reason"] || "")}</td>
            <td><span class="saved-tag">Saved</span></td>
          `;
          tableBody.appendChild(row);
        });
      } catch (error) {
        console.error(error);
        tableBody.innerHTML = "";
        emptyMessage.style.display = "block";
        emptyMessage.textContent = "Could not load requests. Check your Apps Script URL and permissions.";
      }
    }

    window.onload = loadRequests;
  </script>
</body>
</html>
